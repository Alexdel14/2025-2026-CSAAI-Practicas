<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Beat The Word</title>
  <link rel="stylesheet" href="estilo.css">
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div>
      <h1>Beat The Word</h1>
      <p class="subtitle">Sigue la secuencia al ritmo del Beat</p>
    </div>

    <div class="status-box">
      <div><span>Nivel</span><strong id="level">1/5</strong></div>
      <div><span>Tiempo</span><strong id="time">0.0s</strong></div>
      <div><span>Estado</span><strong id="status">En espera</strong></div>
    </div>
  </div>

  <!-- CONTROLES -->
  <div class="controls">
    <button id="startBtn">▶</button>
    <button id="stopBtn">⏹</button>

    <select id="levelSelect">
      <option value="1">Nivel 1</option>
      <option value="2">Nivel 2</option>
      <option value="3">Nivel 3</option>
      <option value="4">Nivel 4</option>
      <option value="5">Nivel 5</option>
    </select>

    <select id="pairSelect">
      <option value="casa">Casa / Cama</option>
      <option value="pato">Pato / Gato</option>
      <option value="queso">Queso / Beso</option>
      <option value="luna">Luna / Cuna</option>
    </select>

    <button id="musicToggleBtn">🎵 Música ON</button>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="message-box" id="message">Pulsa comenzar</div>
    <div class="grid" id="grid"></div>
  </div>

</div>

<audio id="music" src="extracted-audio.wav" loop></audio>
<audio id="tick" src="tick.mp3"></audio>

<script src="juegoo.js"></script>
</body>
</html>
