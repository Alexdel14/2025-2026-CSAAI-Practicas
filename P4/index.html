<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Beat The Word</title>
  <link rel="stylesheet" href="estilo.css">
</head>
<body>

<div class="container">

  <!-- CONFIG -->
  <div class="sidebar">
    <h3>Configuración</h3>

    <label>Secuencia</label>
    <select id="pairSelect">
      <option value="casa">Casa / Cama</option>
      <option value="pato">Pato / Gato</option>
      <option value="queso">Queso / Beso</option>
      <option value="luna">Luna / Cuna</option>
    </select>

    <label>Nivel inicial</label>
    <select id="levelSelect">
      <option value="1">Nivel 1</option>
      <option value="2">Nivel 2</option>
      <option value="3">Nivel 3</option>
      <option value="4">Nivel 4</option>
      <option value="5">Nivel 5</option>
    </select>

    <label>
      VAR 🎤
      <input type="checkbox" id="varMode">
    </label>

    <button id="musicBtn">🎵 Música ON</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <h1>Beat The Word</h1>

    <div class="info">
      Nivel: <span id="level">1/5</span> |
      Tiempo: <span id="time">0.0s</span> |
      Estado: <span id="status">En espera</span>
    </div>

    <div class="controls">
      <button id="startBtn">▶</button>
      <button id="stopBtn">⏹</button>
    </div>

    <div id="message">Pulsa comenzar</div>

    <div class="grid" id="grid"></div>

  </div>

</div>

<audio id="tick" src="tick.mp3"></audio>
<audio id="music" src="extracted-audio.wav" loop></audio>

<script src="juegoo.js"></script>
</body>
</html>
