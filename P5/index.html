<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Bot League Barrio</title>
  <link rel="stylesheet" href="estilo.css">
</head>
<body>

<div id="menu">
  <h1>BOT LEAGUE</h1>
  <button onclick="startGame('3')">A 3 goles</button>
  <button onclick="startGame('golden')">Gol de oro</button>
</div>

<canvas id="gameCanvas"></canvas>

<div id="ui">
  <div id="score">0 - 0</div>
  <div id="message"></div>
</div>

<div id="controls">
  <button onclick="togglePause()">⏸ Pausa</button>
  <button onclick="restart()">🔄 Reiniciar</button>
</div>

<div id="endScreen" class="hidden">
  <h2 id="endText"></h2>
</div>

<!-- móvil -->
<div id="mobileControls">
  <div>
    <button data-key="ArrowUp">▲</button><br>
    <button data-key="ArrowLeft">◀</button>
    <button data-key="ArrowDown">▼</button>
    <button data-key="ArrowRight">▶</button>
  </div>
  <button id="shootBtn">⚽</button>
</div>

<script src="futbito.js"></script>
</body>
</html>
